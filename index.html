<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controle Solar</title>
<style>
  :root{
    --blue:#185fa5; --blue-d:#0c447c; --blue-l:#e9f2fb;
    --bg:#f4f6f9; --card:#ffffff; --line:#e2e8f0; --ink:#1e293b;
    --muted:#64748b; --green-b:#dcfce7; --green-t:#166534;
    --amber-b:#fef3c7; --amber-t:#92400e; --gray-b:#eef2f6; --gray-t:#475569;
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  header{background:var(--blue-d);color:#fff;padding:14px 20px;display:flex;
    align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  header .logo{width:38px;height:38px;border-radius:9px;background:#fff;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-size:18px}
  header .logo img{width:100%;height:100%;object-fit:contain}
  header h1{font-size:17px;margin:0;font-weight:600}
  header .sub{font-size:12px;opacity:.75;margin:0}
  header .sp{flex:1}
  .btn{border:none;border-radius:9px;padding:8px 13px;font-size:13px;cursor:pointer;
    font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .btn-primary{background:#fff;color:var(--blue-d)}
  .btn-ghost{background:rgba(255,255,255,.15);color:#fff}
  .btn-line{background:#fff;color:var(--blue-d);border:1px solid var(--line)}
  .btn-danger{background:#fee2e2;color:#b91c1c}
  .btn:hover{opacity:.9}
  .wrap{max-width:1150px;margin:0 auto;padding:18px 20px 60px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--line)}
  .kpi .l{font-size:12px;color:var(--muted)}
  .kpi .v{font-size:24px;font-weight:700;color:var(--blue-d);margin-top:2px}
  .kpi.amber{background:#fff8ec;border-color:#f5e2bf}
  .kpi.amber .v{color:var(--amber-t)}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:8px 15px;border-radius:9px;background:var(--card);border:1px solid var(--line);
    cursor:pointer;font-weight:600;font-size:13px;color:var(--muted)}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  input,select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);
    border-radius:8px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--blue-l);border-color:var(--blue)}
  .search{flex:1;min-width:180px}
  .msel{position:relative}
  .msel-btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);display:inline-flex;gap:6px;align-items:center}
  .msel-btn b{color:var(--blue-d);font-weight:600}
  .msel-panel{position:absolute;z-index:30;top:112%;left:0;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:8px;min-width:230px;box-shadow:0 8px 24px rgba(15,23,42,.14);display:none;max-height:320px;overflow:auto}
  .msel-panel.open{display:block}
  .msel-panel label{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;font-size:13px;cursor:pointer}
  .msel-panel label:hover{background:var(--blue-l)}
  .msel-panel input{width:auto;margin:0}
  .msel-actions{font-size:12px;padding:2px 6px 7px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .msel-actions a{color:var(--blue-d);cursor:pointer}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  .tbl-scroll{overflow:auto;max-height:70vh}
  thead th{background:var(--blue);color:#fff;text-align:left;padding:10px 12px;font-weight:600;
    position:sticky;top:0;z-index:5;white-space:nowrap}
  tbody td{padding:9px 12px;border-top:1px solid var(--line);vertical-align:middle}
  tbody tr:nth-child(even){background:#f8fafc}
  tbody tr:hover{background:var(--blue-l);cursor:pointer}
  .chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .chip.green{background:var(--green-b);color:var(--green-t)}
  .chip.amber{background:var(--amber-b);color:var(--amber-t)}
  .chip.gray{background:var(--gray-b);color:var(--gray-t)}
  .chip.blue{background:var(--blue-l);color:var(--blue-d)}
  .right{text-align:right}.center{text-align:center}
  .muted{color:var(--muted)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;
    align-items:flex-start;justify-content:center;z-index:50;padding:24px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:720px;padding:0;overflow:hidden}
  .modal h2{margin:0;font-size:16px}
  .modal .mhead{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .modal .mbody{padding:18px 20px;max-height:66vh;overflow:auto}
  .modal .mfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11.5px;color:var(--muted);font-weight:600}
  .field.full{grid-column:1/-1}
  .x{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
  .bar-row{display:grid;grid-template-columns:150px 1fr 34px;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
  .bar-track{background:#eef2f6;border-radius:6px;height:16px;overflow:hidden}
  .bar-fill{height:100%;background:var(--blue);border-radius:6px}
  .sec-title{font-weight:700;color:var(--blue-d);margin:18px 0 8px}
  .clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .cli{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;cursor:pointer}
  .cli:hover{border-color:var(--blue)}
  .cli .nm{font-weight:600}
  .cli .mt{font-size:12px;color:var(--muted);margin-top:4px}
  .filter-note{background:var(--blue-l);color:var(--blue-d);padding:6px 12px;border-radius:8px;
    font-size:12.5px;display:none;align-items:center;gap:8px}
  @media(max-width:640px){.grid3,.grid2{grid-template-columns:1fr}
    thead th{top:0} .bar-row{grid-template-columns:110px 1fr 30px}}
  .hide{display:none}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--blue-d);
    color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  /* login */
  #loginOverlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
    justify-content:center;z-index:80;padding:24px}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:16px;max-width:380px;width:100%;
    padding:28px 26px;box-shadow:0 8px 30px rgba(15,23,42,.08)}
  .login-card .lg-logo{width:96px;height:96px;border-radius:18px;background:#fff;border:1px solid var(--line);
    overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .login-card .lg-logo img{width:100%;height:100%;object-fit:contain}
  .login-card{text-align:center}
  .login-card .field{text-align:left}
  .login-card h2{margin:0 0 2px;font-size:19px;color:var(--blue-d)}
  .login-card p.s{margin:0 0 18px;font-size:13px;color:var(--muted)}
  .login-card input{width:100%}
  .login-card .field{margin-bottom:12px}
  #lg-msg{font-size:12.5px;margin:2px 0 10px;min-height:16px}
  .lg-actions{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  #lg-btn{width:100%;justify-content:center;background:var(--blue);color:#fff;padding:11px}
  #lg-toggle{background:none;border:none;color:var(--blue-d);font-size:12.5px;cursor:pointer;font-family:inherit}
  .synced{font-size:11px;opacity:.8}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="lg-logo"><img id="llogo" alt="FR Soluções Elétricas"></div>
    <h2>Controle Solar</h2>
    <p class="s" id="lg-sub">Entre para acessar seus projetos</p>
    <div class="field"><label>E-mail</label><input id="lg-email" type="email" autocomplete="username" placeholder="voce@exemplo.com"></div>
    <div class="field"><label>Senha</label><input id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <div id="lg-msg"></div>
    <div class="lg-actions">
      <button class="btn" id="lg-btn" onclick="submitLogin()">Entrar</button>
      <button id="lg-toggle" onclick="toggleMode()">Primeira vez? Criar meu acesso</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appRoot" class="hide">
<header>
  <div class="logo"><img id="hlogo" alt="FR"></div>
  <div>
    <h1>Controle Solar</h1>
    <p class="sub" id="hsub">Banco de dados na nuvem</p>
  </div>
  <div class="sp"></div>
  <button class="btn btn-primary" onclick="openEdit()">+ Novo projeto</button>
  <button class="btn btn-ghost" onclick="atualizar()">⟳ Atualizar</button>
  <button class="btn btn-ghost" onclick="exportCSV()">Exportar Excel</button>
  <button class="btn btn-ghost" onclick="exportJSON()">Backup</button>
  <button class="btn btn-ghost" onclick="doLogout()">Sair</button>
</header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>

  <div class="tabs">
    <div class="tab active" data-view="projetos" onclick="setView('projetos')">Projetos</div>
    <div class="tab" data-view="clientes" onclick="setView('clientes')">Clientes</div>
    <div class="tab" data-view="painel" onclick="setView('painel')">Painel</div>
  </div>

  <div id="v-projetos">
    <div class="toolbar">
      <input class="search" id="q" placeholder="Buscar por cliente, instalação, protocolo…" oninput="render()">
      <select id="fcat" onchange="render()"><option value="">Todas categorias</option></select>
      <div class="msel" id="fstatusWrap">
        <button type="button" class="msel-btn" onclick="toggleMsel(event)">Status: <b id="fstatusLabel">—</b> ▾</button>
        <div class="msel-panel" id="fstatusPanel">
          <div class="msel-actions"><a onclick="setStatusAll(false)">Todos</a> · <a onclick="setStatusAll(true)">Só enviados</a></div>
          <div id="fstatusOpts"></div>
        </div>
      </div>
      <select id="fsit" onchange="render()"><option value="">Todas situações</option></select>
    </div>
    <div class="filter-note" id="fnote"></div>
    <div class="card">
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th>Cliente</th><th>Tipo</th><th class="right">Valor</th><th class="right">kWp</th>
            <th>Entrada</th><th>Status</th><th class="center">Situação</th><th class="center">Fat.</th>
          </tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="v-clientes" class="hide">
    <div class="toolbar">
      <input class="search" id="qc" placeholder="Buscar cliente…" oninput="renderClientes()">
    </div>
    <div class="clientes-grid" id="cligrid"></div>
  </div>

  <div id="v-painel" class="hide">
    <div class="sec-title">Projetos por status</div>
    <div class="card" style="padding:14px 18px"><div id="barStatus"></div></div>
    <div class="sec-title">Projetos por situação</div>
    <div class="card" style="padding:14px 18px"><div id="barSit"></div></div>
    <div class="sec-title">A receber</div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Cliente</th><th>Tipo</th><th>Empresa</th><th class="right">Valor</th><th class="center">Pagamento</th></tr></thead>
      <tbody id="recRows"></tbody></table></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;border-top:1px solid var(--line)">
        <input id="nr-cliente" placeholder="Cliente" style="flex:2;min-width:150px">
        <input id="nr-tipo" placeholder="Tipo de serviço" style="flex:1.5;min-width:120px">
        <input id="nr-empresa" list="empresas-list" placeholder="Empresa" style="flex:1.2;min-width:120px">
        <datalist id="empresas-list"></datalist>
        <input id="nr-valor" type="number" step="1" placeholder="Valor R$" style="width:110px">
        <button class="btn" style="background:var(--blue);color:#fff" onclick="addReceber()">+ Adicionar</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead"><h2 id="mtitle">Novo projeto</h2>
      <button class="x" onclick="closeEdit()">×</button></div>
    <div class="mbody">
      <input type="hidden" id="f-id">
      <div class="grid2">
        <div class="field full"><label>Cliente</label><input id="f-cliente"></div>
        <div class="field"><label>Categoria</label><select id="f-categoria"></select></div>
        <div class="field"><label>Tipo de serviço</label><select id="f-tipo"></select></div>
        <div class="field"><label>ID Projeto</label><input id="f-idProjeto"></div>
        <div class="field"><label>Instalação</label><input id="f-instalacao"></div>
        <div class="field"><label>CPF</label><input id="f-cpf"></div>
        <div class="field"><label>Mês</label><input id="f-mes" placeholder="ex.: OUT_25"></div>
      </div>
      <div class="grid3" style="margin-top:12px">
        <div class="field"><label>Valor (R$)</label><input id="f-valor" type="number" step="1"></div>
        <div class="field"><label>Potência (kWp)</label><input id="f-potencia" type="number" step="0.01"></div>
        <div class="field"><label>Total módulos</label><input id="f-modulos" type="number" step="1"></div>
        <div class="field"><label>Data entrada</label><input id="f-dataEntrada" type="date"></div>
        <div class="field"><label>Data vistoria</label><input id="f-dataVistoria" type="date"></div>
        <div class="field"><label>Faturado em</label><input id="f-faturado" type="date"></div>
        <div class="field"><label>Status</label><select id="f-status"></select></div>
        <div class="field"><label>Situação</label><select id="f-situacao"></select></div>
        <div class="field"><label>Empresa</label><input id="f-empresa"></div>
        <div class="field"><label>Nº Protocolo</label><input id="f-protocolo"></div>
        <div class="field"><label>NT Vistoria</label><input id="f-ntVistoria"></div>
      </div>
      <div class="field full" style="margin-top:12px"><label>Observação</label>
        <textarea id="f-obs" rows="2"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn btn-danger" id="delBtn" onclick="delProject()">Excluir</button>
      <button class="btn" id="fatBtn" style="background:var(--amber-b);color:var(--amber-t)" onclick="faturarProjeto()">💲 Faturar</button>
      <div class="sp" style="flex:1"></div>
      <button class="btn btn-line" onclick="closeEdit()">Cancelar</button>
      <button class="btn" style="background:var(--blue);color:#fff" onclick="saveProject()">Salvar</button>
    </div>
  </div>
</div>
</div><!-- /appRoot -->

<div class="toast" id="toast"></div>

const FIELDS = [['id','id'],['categoria','categoria'],['mes','mes'],['idProjeto','id_projeto'],
  ['cliente','cliente'],['instalacao','instalacao'],['cpf','cpf'],['tipo','tipo'],['valor','valor'],
  ['potencia','potencia'],['modulos','modulos'],['dataEntrada','data_entrada'],['protocolo','protocolo'],

  ['faturado','faturado'],['empresa','empresa'],['obs','obs']];
function toCamel(r){ const o={}; FIELDS.forEach(([c,s])=>o[c]=r[s]); return o; }
function toSnake(o){ const r={}; FIELDS.forEach(([c,s])=>{ if(o[c]===undefined) return;
  let v=o[c]; if(v==='') v=null; r[s]=v; }); return r; }

let DB = {projetos:[], receber:[]};
let view = 'projetos';
let cliFilter = '';
let loginMode = 'login';

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200); }
function money(v){ if(v==null||v==='') return '—';
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}); }
function d2br(s){ if(!s) return '—'; const p=String(s).slice(0,10).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }
function uniq(arr){ return [...new Set(arr.filter(Boolean))]; }
function optsList(field, base){
  const inData = uniq(DB.projetos.map(p=>p[field]));
  return uniq([...base, ...inData]).sort((a,b)=>a.localeCompare(b,'pt-BR'));
}
function sitClass(s){ if(s==='Encerrado') return 'green'; if(s==='Aguardando') return 'amber';
  if(s==='Cancelado') return 'gray'; return 'blue'; }
function nextId(){ return DB.projetos.reduce((m,p)=>Math.max(m,p.id||0),0)+1; }

/* ---------- AUTH ---------- */
function lgMsg(t,color){ const el=document.getElementById('lg-msg'); el.textContent=t||'';
  el.style.color = color||'#b91c1c'; }
function toggleMode(){
  loginMode = loginMode==='login' ? 'signup' : 'login';
  document.getElementById('lg-sub').textContent = loginMode==='login'
    ? 'Entre para acessar seus projetos' : 'Crie sua senha de acesso (primeira vez)';
  document.getElementById('lg-btn').textContent = loginMode==='login' ? 'Entrar' : 'Criar acesso';
  document.getElementById('lg-toggle').textContent = loginMode==='login'
    ? 'Primeira vez? Criar meu acesso' : 'Já tenho acesso — entrar';
  document.getElementById('lg-pass').setAttribute('autocomplete',
    loginMode==='login'?'current-password':'new-password');
  lgMsg('');
}
async function submitLogin(){
  const email=(document.getElementById('lg-email').value||'').trim();
  const pass=document.getElementById('lg-pass').value||'';
  if(!email || !pass){ lgMsg('Preencha e-mail e senha.'); return; }
  const btn=document.getElementById('lg-btn'); btn.disabled=true;
  btn.textContent = loginMode==='login' ? 'Entrando…' : 'Criando…';
  try{
    if(loginMode==='login'){
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error){ lgMsg('E-mail ou senha incorretos.'); return; }
    } else {
      if(pass.length<6){ lgMsg('A senha precisa ter ao menos 6 caracteres.'); return; }
      const {error}=await sb.auth.signUp({email,password:pass});
      if(error){ lgMsg(error.message); return; }
      const {data:{session}}=await sb.auth.getSession();
      if(!session){ lgMsg('Acesso criado! Agora confirme pelo e-mail e depois entre.','#166534'); return; }
    }
    await onLoggedIn();
  } finally { btn.disabled=false;
    btn.textContent = loginMode==='login' ? 'Entrar' : 'Criar acesso'; }
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }
async function onLoggedIn(){
  const {data:{user}}=await sb.auth.getUser();
  document.getElementById('hsub').textContent = 'Nuvem · ' + (user?user.email:'');
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appRoot').classList.remove('hide');
  await loadData();
}

/* ---------- DATA ---------- */
async function loadData(){
  const [{data:proj,error:e1},{data:rec,error:e2}] = await Promise.all([
    sb.from('projetos').select('*'),
    sb.from('receber').select('*')
  ]);
  if(e1){ toast('Erro ao carregar: '+e1.message); return; }
  DB.projetos = (proj||[]).map(toCamel);
  DB.receber = (rec||[]).map(r=>({id:r.id,cliente:r.cliente,tipo:r.tipo,empresa:r.empresa,valor:r.valor,
    pago:r.pago,projetoId:r.projeto_id,dataPagamento:r.data_pagamento}));
  refresh();
}
function hoje(){ return new Date().toISOString().slice(0,10); }
async function atualizar(){ await loadData(); toast('Atualizado da nuvem ✔'); }

/* cria (uma vez) a cobrança em A Receber ligada ao projeto */
async function ensureReceberForProject(p){
  if(!p || !p.id || (p.valor||0)<=0) return false;
  if(DB.receber.some(r=>r.projetoId===p.id)) return false;   // já lançado
  const {data,error}=await sb.from('receber')
    .insert({cliente:p.cliente,tipo:p.tipo,empresa:p.empresa||null,valor:p.valor,pago:false,projeto_id:p.id})
    .select();
  if(error){ toast('Erro ao lançar em A receber: '+error.message); return false; }
  DB.receber.push({id:data[0].id,cliente:p.cliente,tipo:p.tipo,empresa:p.empresa,valor:p.valor,
    pago:false,projetoId:p.id,dataPagamento:null});
  return true;
}

/* ---------- RENDER ---------- */
function renderKpis(){
  const P=DB.projetos;
  const valor=P.reduce((s,p)=>s+(p.valor||0),0);
  const pot=P.reduce((s,p)=>s+(p.potencia||0),0);
  const fat=P.filter(p=>p.faturado).length;
  const rec=(DB.receber||[]).filter(r=>!r.pago).reduce((s,r)=>s+(r.valor||0),0);
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="l">Projetos</div><div class="v">${P.length}</div></div>
    <div class="kpi"><div class="l">Valor total</div><div class="v">${money(valor)}</div></div>
    <div class="kpi"><div class="l">Potência (kWp)</div><div class="v">${pot.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div>
    <div class="kpi"><div class="l">Faturados</div><div class="v">${fat}</div></div>
    <div class="kpi amber"><div class="l">A receber</div><div class="v">${money(rec)}</div></div>`;
}
function fillFilters(){
  const set=(id,arr,ph)=>{const el=document.getElementById(id);const cur=el.value;
    el.innerHTML=`<option value="">${ph}</option>`+arr.map(v=>`<option>${v}</option>`).join('');el.value=cur;};
  set('fcat',uniq(DB.projetos.map(p=>p.categoria)),'Todas categorias');
  set('fsit',optsList('situacao',BASE_SIT),'Todas situações');
  buildStatusFilter();
}

/* filtro de Status com seleção múltipla (padrão: só "Projeto Enviado") */
let statusSel = new Set(['Projeto Enviado']);
function buildStatusFilter(){
  const opts=optsList('status',BASE_STATUS);
  document.getElementById('fstatusOpts').innerHTML = opts.map(s=>
    `<label><input type="checkbox" value="${s.replace(/"/g,'&quot;')}" ${statusSel.has(s)?'checked':''}
      onchange="onStatusToggle(this)"> ${s}</label>`).join('');
  updateStatusLabel();
}
function onStatusToggle(cb){ cb.checked?statusSel.add(cb.value):statusSel.delete(cb.value);
  updateStatusLabel(); render(); }
function setStatusAll(sóEnviados){ statusSel = sóEnviados ? new Set(['Projeto Enviado']) : new Set();
  buildStatusFilter(); render(); }
function updateStatusLabel(){ const l=document.getElementById('fstatusLabel');
  l.textContent = statusSel.size===0 ? 'Todos' : (statusSel.size===1 ? [...statusSel][0] : statusSel.size+' selecionados'); }
function toggleMsel(e){ e.stopPropagation(); document.getElementById('fstatusPanel').classList.toggle('open'); }
document.addEventListener('click',e=>{ const w=document.getElementById('fstatusWrap');
  if(w && !w.contains(e.target)) document.getElementById('fstatusPanel').classList.remove('open'); });
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const fc=document.getElementById('fcat').value, fsi=document.getElementById('fsit').value;
  const note=document.getElementById('fnote');
  if(cliFilter){ note.style.display='flex';
    note.innerHTML=`Serviços de <b>&nbsp;${cliFilter}</b>
      &nbsp;<button class="btn" style="background:var(--blue);color:#fff;padding:4px 10px;font-size:12px"
        onclick="novoProjetoCliente('${cliFilter.replace(/'/g,"\\'")}')">+ Novo projeto p/ este cliente</button>
      &nbsp;<a href="#" onclick="cliFilter='';render();return false" style="color:var(--blue-d)">✕ limpar</a>`;}
  else note.style.display='none';
  let rows=DB.projetos.filter(p=>{
    if(cliFilter && p.cliente!==cliFilter) return false;
    if(fc && p.categoria!==fc) return false;
    if(statusSel.size>0 && !statusSel.has(p.status)) return false;
    if(fsi && p.situacao!==fsi) return false;
    if(q){ const blob=`${p.cliente} ${p.instalacao} ${p.protocolo} ${p.cpf} ${p.tipo}`.toLowerCase();
      if(!blob.includes(q)) return false; }
    return true;
  });
  rows.sort((a,b)=>(b.dataEntrada||'').localeCompare(a.dataEntrada||''));
  const tb=document.getElementById('rows');
  if(!rows.length){ tb.innerHTML=`<tr><td colspan="8" class="empty">Nenhum projeto encontrado.</td></tr>`; return; }
  tb.innerHTML=rows.map(p=>`<tr onclick="openEdit(${p.id})">
    <td><b>${p.cliente||'—'}</b>${p.idProjeto?` <span class="muted">#${p.idProjeto}</span>`:''}</td>
    <td>${p.tipo||'—'}</td>
    <td class="right">${money(p.valor)}</td>
    <td class="right">${p.potencia!=null?p.potencia.toLocaleString('pt-BR'):'—'}</td>
    <td>${d2br(p.dataEntrada)}</td>
    <td>${p.status?`<span class="chip blue">${p.status}</span>`:'—'}</td>
    <td class="center">${p.situacao?`<span class="chip ${sitClass(p.situacao)}">${p.situacao}</span>`:'—'}</td>
    <td class="center">${p.faturado?'✅':'—'}</td>
  </tr>`).join('');
}
function renderClientes(){
  const q=(document.getElementById('qc').value||'').toLowerCase();
  const map={};
  DB.projetos.forEach(p=>{ const c=p.cliente; if(!c) return;
    if(!map[c]) map[c]={n:0,v:0,cpf:p.cpf,aguard:0,enviado:0}; map[c].n++; map[c].v+=(p.valor||0);
    if(p.status==='Aguardando') map[c].aguard++;
    if(p.status==='Projeto Enviado') map[c].enviado++; });
  let names=Object.keys(map).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  if(q) names=names.filter(n=>n.toLowerCase().includes(q));
  const g=document.getElementById('cligrid');
  g.innerHTML=names.map(n=>{ const m=map[n]; const chips=[];
    if(m.enviado) chips.push(`<span class="chip blue">Projeto Enviado${m.enviado>1?' ('+m.enviado+')':''}</span>`);
    if(m.aguard) chips.push(`<span class="chip amber">Aguardando${m.aguard>1?' ('+m.aguard+')':''}</span>`);
    return `<div class="cli" onclick="abrirCliente('${n.replace(/'/g,"\\'")}')">
    <div class="nm">${n}</div>
    <div class="mt">${m.n} projeto(s) • ${money(m.v)}${m.cpf?'<br>CPF '+m.cpf:''}</div>
    ${chips.length?`<div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${chips.join('')}</div>`:''}
  </div>`;}).join('') || `<div class="empty">Nenhum cliente.</div>`;
}
function abrirCliente(nome){ cliFilter=nome; setView('projetos'); }
/* item 5: novo projeto já com os dados do cliente */
function novoProjetoCliente(nome){
  const proj=DB.projetos.filter(p=>p.cliente===nome)
    .sort((a,b)=>(b.dataEntrada||'').localeCompare(a.dataEntrada||''));
  const ref=proj[0]||{};
  openEdit();
  document.getElementById('f-cliente').value=nome;
  document.getElementById('f-cpf').value=(proj.find(p=>p.cpf)||{}).cpf||'';
  document.getElementById('f-dataEntrada').value=hoje();
  fillSelect('f-tipo',optsList('tipo',BASE_TIPOS), ref.tipo||'');
  fillSelect('f-status',optsList('status',BASE_STATUS), 'Aguardando');
  fillSelect('f-situacao',optsList('situacao',BASE_SIT), 'Aguardando');
}
function renderPainel(){
  const count=(field)=>{const m={};DB.projetos.forEach(p=>{const k=p[field]||'—';m[k]=(m[k]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
  const bar=(entries)=>{const max=Math.max(1,...entries.map(e=>e[1]));
    return entries.map(([k,v])=>`<div class="bar-row"><div title="${k}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%"></div></div>
      <div class="right"><b>${v}</b></div></div>`).join('');};
  document.getElementById('barStatus').innerHTML=bar(count('status'));
  document.getElementById('barSit').innerHTML=bar(count('situacao'));
  const rec=(DB.receber||[]).slice().sort((a,b)=>(a.pago?1:0)-(b.pago?1:0) || (b.valor||0)-(a.valor||0));
  const pendTotal=rec.filter(r=>!r.pago).reduce((s,r)=>s+(r.valor||0),0);
  const emps=uniq([...DB.projetos.map(p=>p.empresa), ...rec.map(r=>r.empresa)])
    .sort((a,b)=>a.localeCompare(b,'pt-BR'));
  document.getElementById('empresas-list').innerHTML=emps.map(e=>`<option value="${e.replace(/"/g,'&quot;')}">`).join('');
  const empSel=(r)=>`<select onchange="updateRecEmpresa(${r.id},this.value)" style="padding:5px 6px;font-size:12px;max-width:150px">
      <option value=""></option>${emps.map(e=>`<option${e===r.empresa?' selected':''}>${e}</option>`).join('')}</select>`;
  const stSel=(r)=>`<select onchange="togglePago(${r.id},this.value==='pago')"
      style="padding:5px 8px;font-size:12px;font-weight:600;border-radius:20px;border:none;cursor:pointer;
      background:${r.pago?'var(--green-b)':'var(--amber-b)'};color:${r.pago?'var(--green-t)':'var(--amber-t)'}">
      <option value="aguardando"${r.pago?'':' selected'}>Aguardando</option>
      <option value="pago"${r.pago?' selected':''}>Pago</option></select>`;
  document.getElementById('recRows').innerHTML=(rec.length?rec.map(r=>`<tr style="${r.pago?'opacity:.6':''}">
    <td>${r.cliente}</td><td>${r.tipo||'—'}</td>
    <td>${empSel(r)}</td>
    <td class="right">${money(r.valor)}</td>
    <td class="center">${stSel(r)}</td>
  </tr>`).join('')
    +`<tr><td></td><td></td><td class="right"><b>TOTAL PENDENTE</b></td><td class="right"><b>${money(pendTotal)}</b></td><td></td></tr>`
    : `<tr><td colspan="5" class="empty">Nada a receber.</td></tr>`);
}
function setView(v){
  view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  ['projetos','clientes','painel'].forEach(x=>document.getElementById('v-'+x).classList.toggle('hide',x!==v));
  if(v==='projetos') render();
  if(v==='clientes') renderClientes();
  if(v==='painel') renderPainel();
}

/* ---------- EDIT ---------- */
function fillSelect(id,arr,val){const el=document.getElementById(id);
  el.innerHTML=`<option value=""></option>`+arr.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('');
  if(val&&!arr.includes(val)) el.insertAdjacentHTML('beforeend',`<option selected>${val}</option>`);}
function openEdit(id){
  const p = id ? DB.projetos.find(x=>x.id===id) : null;
  document.getElementById('mtitle').textContent = p?'Editar projeto':'Novo projeto';
  document.getElementById('delBtn').style.display = p?'inline-flex':'none';
  document.getElementById('fatBtn').style.display = p?'inline-flex':'none';
  const g=(k)=>p?(p[k]??''):'';
  document.getElementById('f-id').value = p?p.id:'';
  ['cliente','idProjeto','instalacao','cpf','mes','valor','potencia','modulos',
   'dataEntrada','dataVistoria','faturado','empresa','protocolo','ntVistoria','obs']
    .forEach(k=>document.getElementById('f-'+k).value = g(k)==null?'':(''+g(k)).slice(0, k.startsWith('data')||k==='faturado'?10:9999));
  fillSelect('f-categoria',['Projeto Principal','Outro Serviço'], p?p.categoria:'Projeto Principal');
  fillSelect('f-tipo',optsList('tipo',BASE_TIPOS), g('tipo'));
  fillSelect('f-status',optsList('status',BASE_STATUS), g('status'));
  fillSelect('f-situacao',optsList('situacao',BASE_SIT), g('situacao'));
  document.getElementById('overlay').classList.add('open');
}
function closeEdit(){ document.getElementById('overlay').classList.remove('open'); }
async function saveProject(){
  const idv=document.getElementById('f-id').value;
  const val=(k)=>document.getElementById('f-'+k).value.trim();
  const numv=(k)=>{const v=document.getElementById('f-'+k).value; return v===''?null:parseFloat(v);};
  const obj={
    categoria:document.getElementById('f-categoria').value, cliente:val('cliente'),
    idProjeto:val('idProjeto'), instalacao:val('instalacao'), cpf:val('cpf'), mes:val('mes'),
    tipo:document.getElementById('f-tipo').value, valor:numv('valor'), potencia:numv('potencia'),
    modulos:numv('modulos'), dataEntrada:val('dataEntrada'), dataVistoria:val('dataVistoria'),
    faturado:val('faturado'), status:document.getElementById('f-status').value,
    situacao:document.getElementById('f-situacao').value, empresa:val('empresa'),
    protocolo:val('protocolo'), ntVistoria:val('ntVistoria'), obs:val('obs') };
  if(!obj.cliente){ toast('Informe o cliente'); return; }
  const row=toSnake(obj);
  const isNew=!idv; let novoId=null, error;
  if(idv){ row.id=+idv; ({error}=await sb.from('projetos').update(row).eq('id',+idv)); }
  else { novoId=nextId(); row.id=novoId; ({error}=await sb.from('projetos').insert(row)); }
  if(error){ toast('Erro ao salvar: '+error.message); return; }
  await loadData();
  if(isNew){ const np=DB.projetos.find(x=>x.id===novoId);
    if(await ensureReceberForProject(np)){ refresh(); toast('Projeto adicionado e lançado em A receber'); }
    else toast('Projeto adicionado'); }
  else toast('Projeto atualizado');
  closeEdit();
}

/* item 1: Faturar na ficha do projeto -> grava data de hoje + lança em A receber */
async function faturarProjeto(){
  const idv=+document.getElementById('f-id').value;
  if(!idv){ toast('Salve o projeto primeiro, depois fature'); return; }
  const d=hoje();
  const {error}=await sb.from('projetos').update({faturado:d}).eq('id',idv);
  if(error){ toast('Erro ao faturar: '+error.message); return; }
  const p=DB.projetos.find(x=>x.id===idv); if(p) p.faturado=d;
  document.getElementById('f-faturado').value=d;
  const lancou=await ensureReceberForProject(p);
  refresh();
  toast(lancou?'Faturado + lançado em A receber ✔':'Faturado ✔ (já estava em A receber)');
}
async function delProject(){
  const idv=+document.getElementById('f-id').value;
  if(!idv) return;
  if(!confirm('Excluir este projeto? Esta ação não pode ser desfeita.')) return;
  const {error}=await sb.from('projetos').delete().eq('id',idv);
  if(error){ toast('Erro ao excluir: '+error.message); return; }
  await loadData(); closeEdit(); toast('Projeto excluído');
}

/* ---------- A RECEBER ---------- */
async function togglePago(id, pago){
  const d=pago?hoje():null;
  const {error}=await sb.from('receber').update({pago:pago,data_pagamento:d}).eq('id',id);
  if(error){ toast('Erro: '+error.message); return; }
  const r=DB.receber.find(x=>x.id===id); if(r){ r.pago=pago; r.dataPagamento=d; }
  // item 2: ao pagar, grava a data de hoje no Faturado do projeto ligado
  if(pago && r && r.projetoId){
    await sb.from('projetos').update({faturado:d}).eq('id',r.projetoId);
    const p=DB.projetos.find(x=>x.id===r.projetoId); if(p) p.faturado=d;
  }
  renderKpis(); renderPainel(); if(view==='projetos') render();
  toast(pago?'Pago em '+d2br(d)+' — Faturado atualizado ✔':'Voltou para Aguardando');
}
async function updateRecEmpresa(id, empresa){
  const {error}=await sb.from('receber').update({empresa:empresa||null}).eq('id',id);
  if(error){ toast('Erro: '+error.message); return; }
  const r=DB.receber.find(x=>x.id===id); if(r) r.empresa=empresa;
  toast('Empresa atualizada');
}
async function addReceber(){
  const cliente=document.getElementById('nr-cliente').value.trim();
  const tipo=document.getElementById('nr-tipo').value.trim();
  const empresa=document.getElementById('nr-empresa').value.trim();
  const v=document.getElementById('nr-valor').value;
  if(!cliente || v===''){ toast('Informe cliente e valor'); return; }
  const {data,error}=await sb.from('receber').insert({cliente,tipo,empresa:empresa||null,valor:parseFloat(v),pago:false}).select();
  if(error){ toast('Erro: '+error.message); return; }
  DB.receber.push({id:data[0].id,cliente,tipo,empresa,valor:parseFloat(v),pago:false});
  ['nr-cliente','nr-tipo','nr-empresa','nr-valor'].forEach(i=>document.getElementById(i).value='');
  renderKpis(); renderPainel(); toast('Cobrança adicionada');
}

/* ---------- EXPORT ---------- */
/* backup para pasta (Google Drive) via File System Access API, com Excel real */
function idbReq(mode, fn){ return new Promise((res,rej)=>{ const o=indexedDB.open('cs-fs',1);
  o.onupgradeneeded=()=>o.result.createObjectStore('h'); o.onerror=()=>rej(o.error);
  o.onsuccess=()=>{ const tx=o.result.transaction('h',mode); const r=fn(tx.objectStore('h'));
    tx.oncomplete=()=>res(r&&r.result); tx.onerror=()=>rej(tx.error); }; }); }
const idbGet=(k)=>idbReq('readonly',s=>s.get(k));
const idbSet=(k,v)=>idbReq('readwrite',s=>s.put(v,k));

function buildXlsx(){
  const cols=['categoria','mes','idProjeto','cliente','instalacao','cpf','tipo','valor','potencia',
    'modulos','dataEntrada','protocolo','dataVistoria','ntVistoria','status','situacao','faturado','empresa','obs'];
  const head=['Categoria','Mês','ID','Cliente','Instalação','CPF','Tipo','Valor','Potência(kWp)',
    'Módulos','Data Entrada','Protocolo','Data Vistoria','NT Vistoria','Status','Situação','Faturado','Empresa','Observação'];
  const proj=DB.projetos.slice().sort((a,b)=>(b.dataEntrada||'').localeCompare(a.dataEntrada||''));
  const aoa=[head, ...proj.map(p=>cols.map(c=>p[c]==null?'':p[c]))];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), 'Projetos');
  return XLSX.write(wb,{type:'array',bookType:'xlsx'});
}

async function ensureDir(){
  let h=null; try{ h=await idbGet('dir'); }catch(e){}
  if(h){ let p=await h.queryPermission({mode:'readwrite'});
    if(p!=='granted') p=await h.requestPermission({mode:'readwrite'});
    if(p==='granted') return h; }
  h=await window.showDirectoryPicker({mode:'readwrite', id:'backup-controle-solar'});
  await idbSet('dir',h); return h;
}
async function writeInto(dir,name,data){ const fh=await dir.getFileHandle(name,{create:true});
  const w=await fh.createWritable(); await w.write(data); await w.close(); }

async function exportJSON(){
  const date=new Date().toISOString().slice(0,10);
  const jsonBlob=new Blob([JSON.stringify(DB,null,1)],{type:'application/json'});
  const xlsxBlob=new Blob([buildXlsx()],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const jname=`backup-controle-solar-${date}.json`, xname=`projetos-solar-${date}.xlsx`;
  if(window.showDirectoryPicker){
    try{
      const dir=await ensureDir();
      await writeInto(dir,jname,jsonBlob);
      await writeInto(dir,xname,xlsxBlob);
      toast('Backup salvo na pasta (JSON + Excel) ✔');
      return;
    }catch(e){
      if(e && e.name==='AbortError'){ toast('Backup cancelado'); return; }
      toast('Não deu p/ salvar na pasta — baixando…');
    }
  }
  dl(jsonBlob,jname); dl(xlsxBlob,xname);
  toast('Backup baixado (JSON + Excel)');
}
function exportCSV(){
  const cols=['categoria','mes','idProjeto','cliente','instalacao','cpf','tipo','valor','potencia',
    'modulos','dataEntrada','protocolo','dataVistoria','ntVistoria','status','situacao','faturado','empresa','obs'];
  const head=['Categoria','Mês','ID','Cliente','Instalação','CPF','Tipo','Valor','Potência(kWp)',
    'Módulos','Data Entrada','Protocolo','Data Vistoria','NT Vistoria','Status','Situação','Faturado','Empresa','Observação'];
  const esc=(v)=>{v=(v==null?'':String(v)); return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[head.join(';')].concat(DB.projetos.map(p=>cols.map(c=>esc(p[c])).join(';')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  dl(blob,`projetos-solar-${new Date().toISOString().slice(0,10)}.csv`); toast('Arquivo Excel (CSV) baixado');
}
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

function refresh(){ renderKpis(); fillFilters(); setView(view); }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeEdit(); });
document.getElementById('lg-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') submitLogin(); });

(async function boot(){
  const {data:{session}} = await sb.auth.getSession();
  if(session) await onLoggedIn();
})();
</script>
